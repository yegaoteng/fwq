<!-- mc_monitor_v6.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft 服务器监控 (支持IPv6)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 25px;
            background: rgba(30, 41, 59, 0.7);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #22d3ee, #0ea5e9);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .ipv6-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: linear-gradient(45deg, #059669, #10b981);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        
        .subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-top: 10px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(30, 41, 59, 0.7);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-3px);
            border-color: rgba(34, 211, 238, 0.3);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }
        
        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        .online-icon { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .offline-icon { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .ipv4-icon { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .ipv6-icon { background: rgba(168, 85, 247, 0.2); color: #a855f7; }
        .total-icon { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        
        .stat-content {
            flex: 1;
        }
        
        .stat-number {
            font-size: 2.2rem;
            font-weight: bold;
            line-height: 1;
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-top: 5px;
        }
        
        .servers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .server-card {
            background: rgba(30, 41, 59, 0.7);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            transition: all 0.3s ease;
        }
        
        .server-card:hover {
            transform: translateY(-5px);
            border-color: rgba(34, 211, 238, 0.3);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }
        
        .server-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        
        .server-address {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 1.1rem;
            color: #f1f5f9;
            word-break: break-all;
        }
        
        .status-badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            white-space: nowrap;
        }
        
        .status-online { background: rgba(34, 197, 94, 0.2); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.3); }
        .status-offline { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        .status-invalid { background: rgba(245, 158, 11, 0.2); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); }
        .status-timeout { background: rgba(251, 191, 36, 0.2); color: #fbbf24; border: 1px solid rgba(251, 191, 36, 0.3); }
        .status-error { background: rgba(244, 63, 94, 0.2); color: #f43f5e; border: 1px solid rgba(244, 63, 94, 0.3); }
        
        .server-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
        }
        
        .info-label {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 5px;
        }
        
        .info-value {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.95rem;
            color: #e2e8f0;
            word-break: break-all;
        }
        
        .ipv6-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(168, 85, 247, 0.2);
            color: #a855f7;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-top: 3px;
        }
        
        .error-box {
            margin-top: 10px;
            padding: 10px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 6px;
            font-size: 0.85rem;
            color: #fca5a5;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(45deg, #0ea5e9, #3b82f6);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(14, 165, 233, 0.3);
        }
        
        .btn-secondary {
            background: rgba(148, 163, 184, 0.2);
            color: #e2e8f0;
            border: 1px solid rgba(148, 163, 184, 0.3);
        }
        
        .btn-secondary:hover {
            background: rgba(148, 163, 184, 0.3);
        }
        
        .config-info {
            background: rgba(30, 41, 59, 0.8);
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            border: 1px solid rgba(148, 163, 184, 0.2);
        }
        
        .config-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .config-content {
            font-family: 'Consolas', 'Monaco', monospace;
            background: rgba(15, 23, 42, 0.8);
            padding: 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            line-height: 1.6;
            overflow-x: auto;
            border: 1px solid rgba(148, 163, 184, 0.1);
        }
        
        .config-line {
            margin-bottom: 5px;
        }
        
        .config-comment {
            color: #64748b;
        }
        
        .config-address {
            color: #22d3ee;
        }
        
        .config-port {
            color: #a855f7;
        }
        
        .loading {
            text-align: center;
            padding: 60px 20px;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(148, 163, 184, 0.1);
            border-top-color: #22d3ee;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }
        
        .last-update {
            text-align: center;
            color: #94a3b8;
            font-size: 0.9rem;
            margin-top: 20px;
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(148, 163, 184, 0.2);
            color: #64748b;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>
                🎮 Minecraft 服务器监控
                <span class="ipv6-badge">IPv6 ✅</span>
            </h1>
            <p class="subtitle">从配置文件读取服务器地址，实时监控在线状态（支持IPv6）</p>
        </header>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon online-icon">🟢</div>
                <div class="stat-content">
                    <div class="stat-number" id="online-count">0</div>
                    <div class="stat-label">在线服务器</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon offline-icon">🔴</div>
                <div class="stat-content">
                    <div class="stat-number" id="offline-count">0</div>
                    <div class="stat-label">离线服务器</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon ipv4-icon">🔢</div>
                <div class="stat-content">
                    <div class="stat-number" id="ipv4-count">0</div>
                    <div class="stat-label">IPv4 服务器</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon ipv6-icon">🔢</div>
                <div class="stat-content">
                    <div class="stat-number" id="ipv6-count">0</div>
                    <div class="stat-label">IPv6 服务器</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon total-icon">📊</div>
                <div class="stat-content">
                    <div class="stat-number" id="total-count">0</div>
                    <div class="stat-label">总计服务器</div>
                </div>
            </div>
        </div>
        
        
        
        <div id="server-list" class="servers-grid">
            <!-- 服务器卡片将动态加载到这里 -->
        </div>
        
        <div class="controls">
            <button class="btn btn-primary" onclick="refreshStatus()">
                <span>🔄</span> 刷新状态
            </button>
        </div>
        
        <div class="last-update" id="last-update">
            最后更新: 正在加载...
        </div>
        
        <div class="footer">
            <p>© 2026</p>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://mcfwq.webwd.de5.net:5000/api';
        let serverData = [];
        
        async function loadServerStatus() {
            const container = document.getElementById('server-list');
            container.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>正在连接服务器...</p>
                </div>
            `;
            
            try {
                const response = await fetch(`${API_BASE_URL}/servers/status`);
                serverData = await response.json();
                renderServerList();
                updateStats();
                document.getElementById('last-update').textContent = 
                    `最后更新: ${new Date().toLocaleString()}`;
            } catch (error) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>无法连接到监控服务</h3>
                        <p>请确保后端服务正在运行 (http://localhost:5000)</p>
                        <p>错误信息: ${error.message}</p>
                        <p style="margin-top: 20px;">
                            <button class="btn btn-primary" onclick="loadServerStatus()">重试连接</button>
                        </p>
                    </div>
                `;
            }
        }
        
        function renderServerList() {
            const container = document.getElementById('server-list');
            
            if (!serverData || serverData.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>没有找到服务器配置</h3>
                        <p>请在 mc_servers.txt 文件中添加服务器地址</p>
                        <p style="margin-top: 20px;">
                            <button class="btn btn-secondary" onclick="showConfigHelp()">查看配置帮助</button>
                        </p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = serverData.map(server => `
                <div class="server-card">
                    <div class="server-header">
                        <div>
                            <div class="server-address">${escapeHtml(server.original)}</div>
                            ${server.ip_version === 'IPv6' ? 
                                '<div class="ipv6-indicator">🌐 IPv6</div>' : ''}
                        </div>
                        <div class="status-badge status-${server.status}">
                            ${getStatusText(server.status)}
                        </div>
                    </div>
                    
                    <div class="server-info">
                        <div class="info-item">
                            <span class="info-label">IP地址</span>
                            <span class="info-value">${server.resolved_ip || '未解析'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">端口</span>
                            <span class="info-value">${server.port}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">原始地址</span>
                            <span class="info-value">${escapeHtml(server.address)}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">IP版本</span>
                            <span class="info-value">${server.ip_version || '未知'}</span>
                        </div>
                    </div>
                    
                    ${server.error ? `
                        <div class="error-box">
                            <strong>错误:</strong> ${escapeHtml(server.error)}
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }
        
        function getStatusText(status) {
            const statusMap = {
                'online': '在线',
                'offline': '离线',
                'invalid': '地址无效',
                'timeout': '连接超时',
                'error': '连接错误'
            };
            return statusMap[status] || status;
        }
        
        function updateStats() {
            const onlineCount = serverData.filter(s => s.status === 'online').length;
            const offlineCount = serverData.filter(s => s.status !== 'online').length;
            const ipv4Count = serverData.filter(s => s.ip_version === 'IPv4').length;
            const ipv6Count = serverData.filter(s => s.ip_version === 'IPv6').length;
            const totalCount = serverData.length;
            
            document.getElementById('online-count').textContent = onlineCount;
            document.getElementById('offline-count').textContent = offlineCount;
            document.getElementById('ipv4-count').textContent = ipv4Count;
            document.getElementById('ipv6-count').textContent = ipv6Count;
            document.getElementById('total-count').textContent = totalCount;
        }
        
        async function refreshStatus() {
            const refreshBtn = document.querySelector('.btn-primary');
            const originalText = refreshBtn.innerHTML;
            refreshBtn.innerHTML = '<div class="spinner" style="width: 20px; height: 20px; border-width: 2px;"></div> 检查中...';
            
            try {
                const response = await fetch(`${API_BASE_URL}/servers/refresh`, {
                    method: 'POST'
                });
                const data = await response.json();
                serverData = data.results;
                renderServerList();
                updateStats();
                document.getElementById('last-update').textContent = 
                    `最后更新: ${new Date().toLocaleString()}`;
                
                showNotification(`已刷新 ${serverData.length} 个服务器`, 'success');
            } catch (error) {
                showNotification('刷新失败: ' + error.message, 'error');
            } finally {
                refreshBtn.innerHTML = originalText;
            }
        }
        
        
        
        function showNotification(message, type = 'info', duration = 3000) {
            // 移除现有通知
            const existingNotification = document.querySelector('.notification');
            if (existingNotification) {
                existingNotification.remove();
            }
            
            // 创建通知元素
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                left: 20px;
                max-width: 400px;
                padding: 20px;
                border-radius: 12px;
                background: ${type === 'success' ? 'rgba(34, 197, 94, 0.9)' : 
                           type === 'error' ? 'rgba(239, 68, 68, 0.9)' : 
                           'rgba(30, 41, 59, 0.9)'};
                color: white;
                font-weight: bold;
                z-index: 1000;
                animation: slideIn 0.3s ease;
                backdrop-filter: blur(10px);
                border: 1px solid ${type === 'success' ? 'rgba(34, 197, 94, 0.3)' : 
                           type === 'error' ? 'rgba(239, 68, 68, 0.3)' : 
                           'rgba(148, 163, 184, 0.3)'};
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            `;
            
            notification.innerHTML = message;
            document.body.appendChild(notification);
            
            // 自动移除
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, duration);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 添加CSS动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
        
        // 页面加载时自动加载
        document.addEventListener('DOMContentLoaded', loadServerStatus);
        
        // 每60秒自动刷新一次
        setInterval(loadServerStatus, 30000);
    </script>
</body>
</html>
